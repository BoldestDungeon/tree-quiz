<html>
  <head>
    <title>NDSU Tree Quiz</title>
    <link rel="icon" href="/tree-quiz/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/tree-quiz/src/treequiz.css"/>
    <script type="text/javascript" src="/tree-quiz/src/treequiz.js" defer></script>
  </head>
  <body>
    <section id="loading" class="active">
      <div class="loading"></div>
    </section>
    <section id="landing">
      <h1 data-language-key="landing_heading"></h1>
      <div class="main-actions">
        <a class="datasheet-link" href="" target="_blank" data-language-key="landing_datasheet_link"></a>
        <button class="quiz-start" type="button" data-language-key="landing_start_quiz" onclick="goToIntroOrQuiz()"></button>
        <a class="homepage-link" href="https://boldestdungeon.github.io/tree-quiz/debug/no-im-a-plant.mp4" target="_blank" data-language-key="landing_homepage_link"></a>
        <div class="language-selection-wrapper">
          <label for="language-select" data-language-key="landing_languages"></label>
          <select id="language-select"></select>
        </div>
      </div>
    </section>

    <section id="welcome">
      <div class="welcome_wrapper">
        <h2 class="welcome-heading" data-language-key="welcome_heading"></h2>
        <p class="welcome-body" data-language-key="welcome_text"></p>
        <button class="welcome-dismiss" data-language-key="welcome_action" onclick="goToQuizPage()"></button>
      </div>
    </section>

    <section id="quiz_main">
      <h2 class="quiz-main-heading" data-language-key="quiz_main_heading"></h2>
      <div id="quiz_content" class="quiz-wrapper">
        <img class="tree_image" />
        <div class="question seasonal_list" id="question_seasonal">
          <h3 class="question_heading" data-language-key="quiz_seasonal_heading"></h3>
          <button id="seasonal_close" class="answer" onclick="hideQuestion('seasonal')" data-language-key="quiz_seasonal_close"></button>
        </div>
      </div>
      <div class="quiz-footer">
        <button class="quiz-main-continue" data-language-key="quiz_main_continue" onclick="goToIdentifyPage()"></button>
      </div>
    </section>

    <section id="quiz_identify">
      <h2 class="identify-heading" data-language-key="quiz_identify_heading"></h2>
      <div class="identify-wrapper">
        <img class="tree_image identify_image" />
        <input type="text" id="quiz_identify_input" />
      </div>
      <div class="identify-footer">
        <button class="quiz-identify-submit" data-language-key="quiz_identify_submit" onclick="submitIdentificationAnswer()"></button>
      </div>
    </section>

    <section id="results">
      <h2 class="results-heading" data-language-key="tree_name"></h2>
      <h3 class="synonym-heading" data-language-key="result_synonym_heading"></h3>
      <p class="synonym-list" data-language-key="tree_synonyms"></p>
      <div id="progress_tracker">
        <h3 class="progress_heading" data-language-key="progress_title"></h3>
      </div>
      <div class="final-actions">
        <a class="datasheet-link" href="" target="_blank" data-language-key="landing_datasheet_link"></a>
        <a class="homepage-link" href="https://boldestdungeon.github.io/tree-quiz/debug/no-im-a-plant.mp4" target="_blank" data-language-key="landing_homepage_link"></a>
      </div>
    </section>
  </body>
</html>
